name: Playwright Tests CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests (Shard ${{ matrix.shard }})
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers & OS Deps
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test --shard=${{ matrix.shard }}
      env:
        PLAYWRIGHT_HTML_REPORT: blob
      
    - name: Upload blob report to GitHub Actions Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: all-blob-reports-${{ strategy.job-index }}
        path: blob-report
        retention-days: 1

  merge-reports:
    name: Merge Sharded Reports
    if: always()
    needs: [test]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install dependencies
      run: npm ci

    - name: Download all blob reports
      uses: actions/download-artifact@v4
      with:
        pattern: all-blob-reports-*
        path: all-blob-reports
        merge-multiple: true

    - name: Merge into single HTML Report
      run: npx playwright merge-reports --reporter html ./all-blob-reports

    - name: Upload Unified HTML Report
      uses: actions/upload-artifact@v4
      with:
        name: playwright-final-report
        path: playwright-report
        retention-days: 15